# mise: https://mise.jdx.dev/
#
# TypeScript + SQL/pgTAP monorepo. mise pins toolchains and owns the
# top-level task orchestration. Per-language tasks dispatch to the
# native toolchain (pnpm for TS) or to zx scripts when Docker/Postgres
# orchestration is needed.

[tools]
node = "24"
pnpm = "10"

[env]
_.file = { path = ".env", optional = true }

# ---------- Top-level fan-outs ----------
[tasks.install]
description = "Install all dependencies"
depends = ["ts:install"]

[tasks.lint]
description = "Run all linters"
depends = ["ts:lint"]

[tasks.format]
description = "Auto-format all languages"
depends = ["ts:format"]

[tasks.test]
description = "Run unit tests (does not start Postgres)"
depends = ["ts:test"]

[tasks.build]
description = "Build all buildable targets"
depends = ["ts:build"]

[tasks.clean]
description = "Remove build output"
depends = ["ts:clean"]

[tasks.ci]
description = "Full CI gate"
depends = ["ci:ts"]

[tasks.ci-watch]
description = "Watch PR checks (or the latest run) for the current branch; exits non-zero on failure"
run = """
set -e
branch=$(git branch --show-current)
if [ -z "$branch" ]; then echo "Detached HEAD — no branch to watch" >&2; exit 1; fi
sleep 3
pr=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number' 2>/dev/null || true)
if [ -n "$pr" ]; then
  echo "Watching checks on PR #$pr ($branch)..."
  gh pr checks "$pr" --watch
else
  run_id=$(gh run list --branch "$branch" --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null || true)
  if [ -z "$run_id" ]; then echo "No open PR or recent run found for $branch" >&2; exit 1; fi
  echo "No open PR for $branch; watching run $run_id..."
  gh run watch --exit-status "$run_id"
fi
"""

# ---------- TypeScript ----------
[tasks."ts:install"]
description = "pnpm install"
run = "pnpm install"

[tasks."ts:lint"]
description = "Biome check across the workspace"
run = "pnpm lint"

[tasks."ts:format"]
description = "Biome format --write"
run = "pnpm format"

[tasks."ts:test"]
description = "Jest across all packages (requires Postgres for tlm-tests)"
run = "pnpm recursive run test"

[tasks."ts:build"]
description = "tsc across all packages"
run = "pnpm recursive run compile"

[tasks."ts:clean"]
description = "Remove per-package build output and reinstall"
run = ["pnpm recursive run clean", "pnpm recursive install"]

[tasks."ci:ts"]
description = "TS CI gate (clean + lint + Postgres setup + tests + teardown)"
run = """
set -e
pnpm recursive run clean
pnpm recursive install
pnpm lint
pnpm exec zx zx/setup.mjs
trap 'pnpm exec zx zx/destroy.mjs' EXIT
pnpm exec zx zx/test-sql.mjs
pnpm recursive run test
"""

# ---------- SQL (pgTAP) ----------
# The Postgres container setup is needed for both SQL tests (pgTAP) and
# the TS integration tests in tlm-tests; today ci:ts wraps both. These
# tasks exist so you can drive the DB lifecycle by hand.
[tasks."sql:setup"]
description = "Start Postgres container + apply schema + load pgTAP"
run = "pnpm exec zx zx/setup.mjs"

[tasks."sql:test"]
description = "Run pgTAP tests (requires sql:setup)"
run = "pnpm exec zx zx/test-sql.mjs"

[tasks."sql:destroy"]
description = "Stop Postgres container"
run = "pnpm exec zx zx/destroy.mjs"
